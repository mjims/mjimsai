# ============================================================
# MILA Open — Docker Compose (Development & Production)
# ============================================================
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#
# First run: migrations are executed automatically (RUN_MIGRATIONS=1).

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mila}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mila}
    volumes:
      - mila_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mila} -d ${POSTGRES_DB:-mila}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- FastAPI Backend ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mila}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mila}
      RUN_MIGRATIONS: "1"

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      API_KEYS: ${API_KEYS:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY}

      # LLM Providers (set the ones you want to use)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}

      # App
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SAAS_MODE: ${SAAS_MODE:-true}

      # Observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "${API_PORT:-8080}:8080"

  # --- Next.js Dashboard ---
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_URL: http://api:8080
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      NODE_ENV: production
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"

volumes:
  mila_pgdata:
