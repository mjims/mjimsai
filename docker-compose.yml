# ============================================================
# MjimsAI — Docker Compose (Development & Production)
# ============================================================
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#
# First run: migrations are executed automatically (RUN_MIGRATIONS=1).

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mjimsai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mjimsai}
    volumes:
      - mjimsai_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mjimsai} -d ${POSTGRES_DB:-mjimsai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- FastAPI Backend ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mjimsai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mjimsai}
      RUN_MIGRATIONS: "1"

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      API_KEYS: ${API_KEYS:-}

      # Bootstrap admin (first backoffice admin, created by seed)
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-MjimsAI}

      # Email / OTP (SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-MjimsAI <no-reply@mjimsai.com>}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
      BACKOFFICE_URL: ${NEXT_PUBLIC_BACKOFFICE_URL:-http://localhost:3001}

      # Encryption (for per-agent API keys)
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}

      # LLM Providers — platform-level fallback keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}

      # Payments
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SEBPAY_PUBLIC_KEY: ${SEBPAY_PUBLIC_KEY:-}
      SEBPAY_SECRET_KEY: ${SEBPAY_SECRET_KEY:-}
      SEBPAY_ENV: ${SEBPAY_ENV:-sandbox}

      # App
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      SAAS_MODE: ${SAAS_MODE:-true}

      # Observability
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    ports:
      - "${API_PORT:-8080}:8080"

  # --- Next.js Frontend (Landing + Client Dashboard) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  # --- Next.js Backoffice (Admin Panel) ---
  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      INTERNAL_API_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "${BACKOFFICE_PORT:-3001}:3000"

volumes:
  mjimsai_pgdata:
